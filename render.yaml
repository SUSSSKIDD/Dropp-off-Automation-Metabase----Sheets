services:
  - type: web
    name: dropoff-alerts
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: METABASE_URL
        value: https://analytics.leapfinance.com
      - key: METABASE_QUESTION_ID
        value: "33548"
      - key: METABASE_EMAIL
        sync: false
      - key: METABASE_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: NO_CALL_SHEET_ID
        value: 1_87oFyHCPIoLyqZo5TCtuSZkLbHNCETWjJZs9UW56MI
      - key: NO_MEETING_SHEET_ID
        value: 1nnnICEEXojtqwcOzQVDKAhY-NUZzAy-wdh4g8wnr6Y8
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: RUN_SECRET
        sync: false
